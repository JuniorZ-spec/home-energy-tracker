services:
  mysql:
    image: mysql:8.3.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: home_energy_tracker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init-prod.sql:/docker-entrypoint-initdb.d/init-prod.sql
    command: --innodb-buffer-pool-size=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak?createDatabaseIfNotExist=true
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      JAVA_OPTS_APPEND: "-Xms128m -Xmx256m"
    ports:
      - "8091:8080"
    depends_on:
      mysql:
        condition: service_healthy

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 'energy-tracker-cluster-1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: leetjourney
      DOCKER_INFLUXDB_INIT_BUCKET: usage-bucket
      DOCKER_INFLUXDB_INIT_RETENTION: 1w
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    ports:
      - "8072:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  user-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-user-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/home_energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  device-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-device-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/home_energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  ingestion-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-ingestion-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      - kafka

  usage-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-usage-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: leetjourney
      INFLUX_BUCKET: usage-bucket
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - influxdb

  alert-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-alert-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/home_energy_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  insight-service:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-insight-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
    ports:
      - "8085:8085"

  api-gateway:
    image: ${DOCKERHUB_NAMESPACE}/home-energy-tracker-api-gateway:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx160m"
      KEYCLOAK_AUTH_JWK_SET_URI: http://keycloak:8080/realms/het-security-realm/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/het-security-realm
    ports:
      - "9000:9000"
    depends_on:
      - keycloak
      - user-service
      - device-service

volumes:
  mysql_data:
  kafka_data:
  influxdb_data: